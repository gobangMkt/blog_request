<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .sw{width:104px;}
  .chip{height:64px;border-radius:10px;border:1px solid #E5E8EB;}
  .lbl{margin-top:6px;font-size:11px;color:#191F28;font-weight:600;letter-spacing:.2px;}
  .hex{font-size:11px;color:#8B95A1;font-family:ui-monospace,Menlo,monospace;}
  .role{font-size:10.5px;color:#8B95A1;line-height:1.4;margin-top:1px;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F0F6FF"></div><div class="lbl">primary-50</div><div class="hex">#F0F6FF</div><div class="role">selected card bg</div></div>
    <div class="sw"><div class="chip" style="background:#EEF3FF"></div><div class="lbl">primary-100</div><div class="hex">#EEF3FF</div><div class="role">badge / icon bg</div></div>
    <div class="sw"><div class="chip" style="background:#D6E6FF"></div><div class="lbl">primary-200</div><div class="hex">#D6E6FF</div><div class="role">btn hover</div></div>
    <div class="sw"><div class="chip" style="background:#D0E2FF"></div><div class="lbl">primary-300</div><div class="hex">#D0E2FF</div><div class="role">info border</div></div>
    <div class="sw"><div class="chip" style="background:#3182F6;border-color:#3182F6"></div><div class="lbl">primary-400 ★</div><div class="hex">#3182F6</div><div class="role">CTA · link · focus</div></div>
    <div class="sw"><div class="chip" style="background:#1B6CF2;border-color:#1B6CF2"></div><div class="lbl">primary-500</div><div class="hex">#1B6CF2</div><div class="role">btn hover-darker</div></div>
    <div class="sw"><div class="chip" style="background:#F8FAFF"></div><div class="lbl">info-bg</div><div class="hex">#F8FAFF</div><div class="role">tinted info surface</div></div>
  </div>
</body></html>
