<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px;background:#F2F4F6;border-radius:10px;}
  .cell img{max-width:130px;height:auto;}
  .lbl{font-size:11px;font-weight:600;color:#191F28;}
  .role{font-size:10.5px;color:#8B95A1;font-family:ui-monospace,Menlo,monospace;text-align:center;}
</style></head>
<body>
  <div class="cell" style="background:#F2F4F6">
    <img src="../assets/gobang-logo-3d.png" alt="3D logo" />
    <div class="lbl">gobang-logo-3d.png</div>
    <div class="role">app-icon · splash · hero</div>
  </div>
  <div class="cell" style="background:#fff;border:1px solid #E5E8EB">
    <img src="../assets/gobang-logo-flat.png" alt="Flat logo" />
    <div class="lbl">gobang-logo-flat.png</div>
    <div class="role">chrome · favicon · footer</div>
  </div>
</body></html>
