<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;align-items:flex-end;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:#3182F6;border-radius:3px;width:32px;}
  .lbl{font-size:11px;font-weight:600;color:#191F28;}
  .v{font-size:10.5px;color:#8B95A1;font-family:ui-monospace,Menlo,monospace;}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="lbl">sp-1</div><div class="v">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="lbl">sp-2</div><div class="v">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="lbl">sp-3</div><div class="v">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="lbl">sp-4</div><div class="v">16</div></div>
    <div class="col"><div class="bar" style="height:20px"></div><div class="lbl">sp-5</div><div class="v">20</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="lbl">sp-6</div><div class="v">24</div></div>
    <div class="col"><div class="bar" style="height:28px"></div><div class="lbl">sp-7</div><div class="v">28</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="lbl">sp-8</div><div class="v">32</div></div>
  </div>
  <div style="margin-top:18px;font-size:11px;color:#8B95A1;font-family:var(--font-sans);">4px base · sheet padding 20px · sheet gap 8px · field gap 16px</div>
</body></html>
