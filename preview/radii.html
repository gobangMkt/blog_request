<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .demo{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .sq{width:64px;height:64px;background:#EEF3FF;border:1.5px solid #3182F6;}
  .lbl{font-size:11px;font-weight:600;color:#191F28;}
  .v{font-size:10.5px;color:#8B95A1;font-family:ui-monospace,Menlo,monospace;}
  .role{font-size:10px;color:#8B95A1;text-align:center;max-width:80px;line-height:1.4;}
</style></head>
<body>
  <div class="row">
    <div class="demo"><div class="sq" style="border-radius:5px"></div><div class="lbl">r-sm</div><div class="v">5px</div><div class="role">checkbox · small tag</div></div>
    <div class="demo"><div class="sq" style="border-radius:6px"></div><div class="lbl">tag</div><div class="v">6px</div><div class="role">type-tag pill</div></div>
    <div class="demo"><div class="sq" style="border-radius:8px"></div><div class="lbl">r-md</div><div class="v">8px</div><div class="role">urgent banner</div></div>
    <div class="demo"><div class="sq" style="border-radius:10px"></div><div class="lbl">r-lg ★</div><div class="v">10px</div><div class="role">default · inputs · buttons</div></div>
    <div class="demo"><div class="sq" style="border-radius:12px"></div><div class="lbl">r-xl</div><div class="v">12px</div><div class="role">template card</div></div>
    <div class="demo"><div class="sq" style="border-radius:20px 20px 0 0"></div><div class="lbl">r-2xl</div><div class="v">20px</div><div class="role">modal sheet (top)</div></div>
    <div class="demo"><div class="sq" style="border-radius:50%"></div><div class="lbl">r-full</div><div class="v">50%</div><div class="role">kw num · icon circle</div></div>
  </div>
</body></html>
