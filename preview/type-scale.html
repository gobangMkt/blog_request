<!doctype html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:20px 24px;background:#fff;font-family:var(--font-sans);color:#191F28;}
  .row{display:grid;grid-template-columns:120px 1fr;gap:18px 20px;align-items:baseline;}
  .meta{font-size:11px;color:#8B95A1;font-family:ui-monospace,Menlo,monospace;letter-spacing:.2px;padding-top:6px;}
  .s11{font-size:11px;font-weight:700;letter-spacing:.3px;color:#3182F6;background:#EEF3FF;padding:2px 8px;border-radius:6px;display:inline-block;}
  .s12{font-size:12px;color:#8B95A1;}
  .s13{font-size:13px;font-weight:600;color:#8B95A1;letter-spacing:.3px;}
  .s14{font-size:14px;font-weight:600;color:#191F28;}
  .s15{font-size:15px;color:#191F28;}
  .s16{font-size:16px;font-weight:700;color:#fff;background:#3182F6;padding:8px 16px;border-radius:8px;display:inline-block;}
  .s18{font-size:18px;font-weight:700;color:#191F28;}
  .s20{font-size:20px;font-weight:700;color:#191F28;line-height:1.4;}
</style></head>
<body>
  <div class="row">
    <div class="meta">20 / 700 · h1</div><div class="s20">블로그 작성 신청서</div>
    <div class="meta">18 / 700 · h2</div><div class="s18">신청을 받지 않고 있어요</div>
    <div class="meta">16 / 700 · button</div><div><span class="s16">신청하기</span></div>
    <div class="meta">15 / 400 · input</div><div class="s15">https://gobang.kr/place/8102</div>
    <div class="meta">14 / 600 · label</div><div class="s14">전화번호</div>
    <div class="meta">13 / 600 · eyebrow</div><div class="s13">신청자 정보</div>
    <div class="meta">12 / 400 · caption</div><div class="s12">동일한 지점 URL로는 1회만 신청 가능합니다.</div>
    <div class="meta">11 / 700 · tag</div><div><span class="s11">A타입</span></div>
  </div>
</body></html>
