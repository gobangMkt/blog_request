<!doctype html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:14px 20px;background:#fff;font-family:var(--font-sans);display:flex;flex-direction:column;gap:8px;border-bottom:1px solid #F2F4F6;}

  .urgent{font-size:14px;font-weight:600;color:#D92B2B;background:#FFF0F2;border-radius:8px;padding:10px 14px;line-height:1.5;}
  .urgent strong{color:#D92B2B;}
</style></head>
<body>
  <div class="row">
    <span class="lbl">신청 기간</span>
    <span class="val">2026-04-01 ~ 2026-05-31</span>
  </div>
  <div class="urgent">⚡ 남은 신청 가능 횟수 <strong>5개</strong></div>
