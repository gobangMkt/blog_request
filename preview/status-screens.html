<!doctype html>
<html lang="ko"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr 1fr;}
  .col{padding:28px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;border-right:1px solid #F2F4F6;}
  .col:last-child{border-right:none;}
  .ic{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .ic.ld{background:#F2F4F6;font-size:20px;}
  .ic.lk{background:#F2F4F6;font-size:24px;}
  .ic.sx{width:64px;height:64px;background:#EEF3FF;font-size:28px;}
  h2{font-size:18px;font-weight:700;color:#191F28;margin:0 0 8px 0;}
  p{font-size:14px;color:#8B95A1;line-height:1.6;margin:0;}
</style></head>
<body>
  <div class="col">
    <div class="ic ld">⏳</div>
    <h2>불러오는 중...</h2>
    <p>&nbsp;</p>
  </div>
  <div class="col">
    <div class="ic lk">🔒</div>
    <h2>신청을 받지 않고 있어요</h2>
    <p>현재 신청 기간이 아닙니다</p>
  </div>
  <div class="col">
    <div class="ic sx">✅</div>
    <h2 style="font-size:20px">신청이 완료됐어요</h2>
    <p>카카오 알림톡이 발송됩니다</p>
  </div>
</body></html>
