<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고방 블로그 — Beta 오픈 이벤트 (PDF)</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* ── Print-friendly base ────────────────────────────────── */
    html, body {
      background: #fff !important;
      margin: 0;
      padding: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Drop the sticky/fixed background look so PDF flows clean */
    body { font-family: var(--font-sans, system-ui), sans-serif; }

    /* ── Print rules ─────────────────────────────────────────── */
    @page {
      size: A4 portrait;
      margin: 12mm 10mm;
    }

    @media print {
      html, body {
        background: #fff !important;
      }
      /* Allow color/gradient/bg to print */
      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      /* Each major section starts fresh-ish; avoid awkward splits */
      section {
        break-inside: avoid;
        page-break-inside: avoid;
      }
      /* Cards and rows shouldn't split across pages */
      [class*="card"], [class*="Card"] { break-inside: avoid; page-break-inside: avoid; }
      /* No animations / transitions */
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      /* Hide scrollbars / interactive cues */
      button { cursor: default; }

      /* Tighten section padding for print */
      section {
        padding-top: 48px !important;
        padding-bottom: 48px !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="variant-a.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<VariantA />);

    // Wait for fonts + render, then expand all FAQ items, then auto-print
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
      } catch (e) { /* ignore */ }
      // give React + Babel + images a beat
      await new Promise(r => setTimeout(r, 600));
      // expand any closed FAQ items by clicking them
      document.querySelectorAll('button').forEach(btn => {
        const txt = btn.textContent || '';
        // FAQ buttons end with a "+" toggle character
        if (txt.includes('＋') || txt.includes('+')) {
          // already-open items show "＋" rotated 45deg (×) — DOM still has "＋" char
          // Just click any closed ones (no marginTop sibling means closed)
          const next = btn.nextElementSibling;
          if (!next) btn.click();
        }
      });
      await new Promise(r => setTimeout(r, 300));
      window.print();
    })();
  </script>
</body>
</html>
